# Builds the Rust workspace and runs unit / integration tests on all major desktop OSes.
# .NET (`generators/`) is covered by `dotnet-ci.yml`.
name: Rust CI

"on":
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # `materials::registry` wgpu smoke test requires an adapter when `CI` is set (GitHub sets it by default).
      # GStreamer dev packages are required by the `gstreamer` / `gstreamer-app` crates pulled in
      # by `renderide` for video texture support; pkg-config resolves their headers/libs at build time.
      - name: Install Linux system dependencies (Vulkan + GStreamer)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers vulkan-tools \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install macOS system dependencies (GStreamer)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gstreamer

      - name: Install Windows system dependencies (GStreamer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress gstreamer gstreamer-devel pkgconfiglite
          "PKG_CONFIG_PATH=C:\gstreamer\1.0\msvc_x86_64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\gstreamer\1.0\msvc_x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - uses: uncenter/setup-taplo@v2
        with:
          version: "0.10.0"

      - name: Check TOML formatting (taplo)
        run: taplo fmt --check --diff

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -W clippy::all -D warnings

      - name: cargo build
        run: cargo build --workspace --locked

      - name: cargo test
        run: cargo test --workspace --locked

      # Spawns the renderer in `--headless` (no window; offscreen PNG), drives the full IPC
      # handshake + sphere upload + scene submission, and compares the rendered PNG against the
      # committed golden via image-compare SSIM using whichever adapter wgpu selects on the runner.
      - name: Golden image integration test
        run: |
          cargo build --locked -p renderide
          cargo run --locked -p renderide-test -- check --timeout-seconds 90
